<section class="page-section active" id="homePage">
<div class="row g-3 mb-4 home-stats-row">
<div class="col-md-4 col-4">
<div class="card stat-card">
<div class="card-body d-flex align-items-center gap-3">
<div class="stat-icon bg-primary-subtle text-primary">
<i class="fa-solid fa-circle-check"></i>
</div>
<div>
<div class="text-muted">الشهداء الموثَّقون</div>
<h3 class="fw-bold mb-0" id="verifiedCount">0</h3>
</div>
</div>
</div>
</div>
<div class="col-md-4 col-4">
<div class="card stat-card">
<div class="card-body d-flex align-items-center gap-3">
<div class="stat-icon bg-warning-subtle text-warning">
<i class="fa-solid fa-clock"></i>
</div>
<div>
<div class="text-muted">شهداء بانتظار التوثق</div>
<h3 class="fw-bold mb-0" id="pendingCount">0</h3>
</div>
</div>
</div>
</div>
<div class="col-md-4 col-4">
<button class="card stat-card w-100 text-start" onclick="openFamiliesStatsPage()">
<div class="card-body d-flex align-items-center gap-3">
<div class="stat-icon bg-success-subtle text-success">
<i class="fa-solid fa-chart-simple"></i>
</div>
<div class="flex-grow-1">
<div class="text-muted">إحصائيات بحسب العائلة</div>
<h5 class="fw-bold mb-0"><span class="family-details-text">تفاصيل</span></h5>
</div>
<i class="fa-solid fa-chevron-left text-muted"></i>
</div>
</button>
</div>
</div>
<div class="mobile-search-filter">
<input class="form-control" id="mobileSearchInput" oninput="syncMobileSearch()" placeholder="ابحث بالاسم أو العائلة..." type="search"/>
<button aria-label="فلترة" class="btn btn-primary" onclick="openMobileFilterModal()">
<i class="fa-solid fa-filter"></i>
</button>
</div>
<div class="filter-card desktop-filter-card mb-4">
<div class="row g-3 align-items-end">
<div class="col-lg-3 col-md-6">
<label class="form-label fw-bold">البحث</label>
<input class="form-control" id="searchInput" oninput="resetMartyrsPageAndRender()" placeholder="ابحث بالاسم، الأب، العائلة..." type="search"/>
</div>
<div class="col-lg-3 col-md-6">
<label class="form-label fw-bold">فلترة حسب العائلة</label>
<select class="form-select" id="familyFilter" onchange="resetMartyrsPageAndRender()">
<option value="">كل العوائل</option>
</select>
</div>
<div class="col-lg-2 col-md-6">
<label class="form-label fw-bold">الحالة</label>
<select class="form-select" id="statusFilter" onchange="changeStatusFilter()">
<option selected="" value="موثق">الأسماء الموثقة</option>
<option value="بانتظار التوثيق">أسماء بانتظار التوثق</option>
<option value="">الكل</option>
</select>
</div>
<div class="col-lg-2 col-md-6">
<label class="form-label fw-bold">الاستكمال</label>
<select class="form-select" id="completionFilter" onchange="resetMartyrsPageAndRender()">
<option value="">الكل</option>
<option value="needs">يحتاج استكمال</option>
<option value="complete">لا يحتاج استكمال</option>
</select>
</div>
<div class="col-lg-2 col-md-6">
<label class="form-label fw-bold">الفرز</label>
<select class="form-select" id="sortSelect" onchange="saveSortPreference(); resetMartyrsPageAndRender()">
<option value="name">أبجديًا حسب الاسم</option>
<option value="family">أبجديًا حسب العائلة</option>
<option value="newest">الأحدث رفعًا</option>
<option value="oldest">الأقدم رفعًا</option>
</select>
</div>
<div class="col-lg-2">
<label class="form-label fw-bold">طريقة العرض</label>
<div class="btn-group w-100 view-toggle">
<button class="btn btn-primary" id="cardsViewBtn" onclick="setViewMode('cards')">
<i class="fa-solid fa-grip"></i>
</button>
<button class="btn btn-outline-primary" id="listViewBtn" onclick="setViewMode('list')">
<i class="fa-solid fa-list"></i>
</button>
</div>
</div>
</div>
</div>
<div class="empty-state" id="loadingBox">
<div class="spinner-border text-primary mb-3"></div>
<div>جاري تحميل البيانات...</div>
</div>
<div id="martyrsContainer"></div>
</section>
