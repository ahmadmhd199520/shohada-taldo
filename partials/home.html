<section class="page-section active" id="homePage">

  <!-- Stats Row -->
  <div class="row g-2 mb-3 home-stats-row">
    <div class="col-md-4 col-4">
      <div class="card stat-card">
        <div class="card-body d-flex align-items-center gap-2">
          <div class="stat-icon bg-success-subtle text-success">
            <i class="fa-solid fa-circle-check"></i>
          </div>
          <div>
            <div class="stat-label text-muted">الشهداء الموثَّقون</div>
            <h3 class="fw-bold mb-0" id="verifiedCount">0</h3>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-4">
      <div class="card stat-card">
        <div class="card-body d-flex align-items-center gap-2">
          <div class="stat-icon bg-warning-subtle text-warning">
            <i class="fa-solid fa-clock"></i>
          </div>
          <div>
            <div class="stat-label text-muted">قيد التدقيق</div>
            <h3 class="fw-bold mb-0" id="pendingCount">0</h3>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-4">
      <button class="card stat-card w-100 text-start" onclick="openFamiliesStatsPage()">
        <div class="card-body d-flex align-items-center gap-2">
          <div class="stat-icon bg-primary-subtle text-primary">
            <i class="fa-solid fa-chart-simple"></i>
          </div>
          <div class="flex-grow-1">
            <div class="stat-label text-muted">إحصائيات العائلة</div>
            <h5 class="fw-bold mb-0"><span class="family-details-text">تفاصيل</span></h5>
          </div>
          <i class="fa-solid fa-chevron-left text-muted ms-1"></i>
        </div>
      </button>
    </div>
  </div>

  <!-- Search bar: Mobile -->
  <div class="mobile-search-filter unified-search-bar">
    <input class="form-control" id="mobileSearchInput" type="search"
           placeholder="ابحث بالاسم أو العائلة..." oninput="syncMobileSearch()"/>
    <button class="btn btn-primary" onclick="openMobileFilterModal()" aria-label="فلترة">
      <i class="fa-solid fa-sliders"></i>
    </button>
  </div>

  <!-- Search + Filters: Desktop -->
  <div class="filter-card desktop-filter-card mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-lg-3 col-md-6">
        <label class="form-label fw-bold">البحث</label>
        <input class="form-control" id="searchInput" type="search"
               placeholder="ابحث بالاسم، الأب، العائلة..."
               oninput="resetMartyrsPageAndRender()"/>
      </div>
      <div class="col-lg-3 col-md-6">
        <label class="form-label fw-bold">العائلة</label>
        <select class="form-select" id="familyFilter" onchange="resetMartyrsPageAndRender()">
          <option value="">كل العوائل</option>
        </select>
      </div>
      <div class="col-lg-2 col-md-6">
        <label class="form-label fw-bold">الحالة</label>
        <select class="form-select" id="statusFilter" onchange="changeStatusFilter()">
          <option value="موثق" selected>الموثَّقون</option>
          <option value="بانتظار التوثيق">قيد التدقيق</option>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-lg-2 col-md-6">
        <label class="form-label fw-bold">الفرز</label>
        <select class="form-select" id="sortSelect"
                onchange="saveSortPreference(); resetMartyrsPageAndRender()">
          <option value="name">أبجديًا بالاسم</option>
          <option value="family">أبجديًا بالعائلة</option>
          <option value="newest">الأحدث</option>
          <option value="oldest">الأقدم</option>
        </select>
      </div>
      <div class="col-lg-2">
        <label class="form-label fw-bold">العرض</label>
        <div class="btn-group w-100 view-toggle">
          <button class="btn btn-primary" id="cardsViewBtn" onclick="setViewMode('cards')">
            <i class="fa-solid fa-grip"></i>
          </button>
          <button class="btn btn-outline-primary" id="listViewBtn" onclick="setViewMode('list')">
            <i class="fa-solid fa-list"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="empty-state" id="loadingBox">
    <div class="spinner-border text-primary mb-3"></div>
    <div>جاري تحميل البيانات...</div>
  </div>
  <div id="martyrsContainer"></div>
</section>

<!-- Hidden completionFilter kept for JS compatibility -->
<select id="completionFilter" class="d-none" onchange="resetMartyrsPageAndRender()">
  <option value="">الكل</option>
  <option value="needs">يحتاج استكمال</option>
  <option value="complete">لا يحتاج استكمال</option>
</select>
