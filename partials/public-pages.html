<section class="page-section" id="familiesPage">
  <div class="page-header">
    <h3 class="fw-bold mb-0">
      <i class="fa-solid fa-chart-simple text-success ms-2"></i>
      إحصائيات بحسب العائلة
    </h3>
    <button class="btn btn-outline-primary btn-sm" onclick="goHome()">
      <i class="fa-solid fa-arrow-right ms-1"></i>
      رجوع
    </button>
  </div>

  <!-- Unified search bar for families page -->
  <div class="mobile-search-filter unified-search-bar mb-3" id="familiesSearchBar">
    <input class="form-control" type="search" id="familiesSearchInput"
           placeholder="ابحث باسم العائلة..." oninput="filterFamiliesStats()"/>
  </div>

  <div id="familiesStatsContainer"></div>
</section>

<section class="page-section" id="familyMartyrsPage">
  <div class="page-header">
    <h3 class="fw-bold mb-0" id="familyPageTitle">شهداء العائلة</h3>
    <button class="btn btn-outline-primary btn-sm" onclick="showPage('familiesPage')">
      <i class="fa-solid fa-arrow-right ms-1"></i>
      رجوع
    </button>
  </div>

  <!-- Unified search bar for family martyrs -->
  <div class="mobile-search-filter unified-search-bar mb-3 family-compact-search-filter" id="familyCompactSearchBar">
    <input class="form-control" type="search" id="familyCompactSearchInput"
           placeholder="ابحث ضمن هذه العائلة..."/>
    <button class="btn btn-primary" type="button" onclick="openFamilyCompactFilterModalFinal()" aria-label="فلترة العائلة">
      <i class="fa-solid fa-filter"></i>
    </button>
  </div>

  <div id="familyMartyrsContainer"></div>
</section>

<section class="page-section" id="detailsPage">
  <div class="page-header">
    <h3 class="fw-bold mb-0">
      <i class="fa-solid fa-id-card text-success ms-2"></i>
      صفحة الشهيد
    </h3>
    <button class="btn btn-outline-primary btn-sm" onclick="goBackFromDetails()">
      <i class="fa-solid fa-arrow-right ms-1"></i>
      رجوع
    </button>
  </div>
  <div id="detailsContainer"></div>
</section>
