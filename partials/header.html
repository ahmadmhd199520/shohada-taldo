<section class="hero mb-3">
  <div class="hero-layout">

    <!-- ROW 1: Logo + Title + Admin Actions -->
    <div class="hero-top-row">
      <div class="hero-brand">
        <div class="hero-logo-wrap" id="heroLogoWrap">
          <img src="https://drive.google.com/thumbnail?id=1aIrorrnp_EiMzRhGKR2Jy_oTrI2NdZhb&sz=w64"
               alt="شعار تلدو" class="hero-logo" onerror="this.style.display='none'">
        </div>
        <div class="hero-title-block">
          <h1 class="hero-title mb-0">أرشيف شهداء تلدو</h1>
          <div class="hero-tagline">منصة توثيقية إنسانية</div>
        </div>
      </div>

      <div class="hero-admin-actions top-login-bar header-inline-actions">
        <button class="btn btn-outline-light btn-sm admin-icon-btn" id="loginBtn"
                onclick="openLoginModal()" title="تسجيل الدخول" aria-label="تسجيل الدخول">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span class="admin-btn-text">دخول</span>
        </button>
        <button class="btn btn-outline-light btn-sm admin-icon-btn d-none" id="dashboardBtn"
                onclick="openDashboardPage()" title="لوحة التحكم" aria-label="لوحة التحكم">
          <i class="fa-solid fa-gauge-high"></i>
          <span class="admin-btn-text">التحكم</span>
        </button>
        <button class="btn btn-outline-light btn-sm admin-icon-btn d-none" id="logoutBtn"
                onclick="logoutAdmin()" title="تسجيل الخروج" aria-label="تسجيل الخروج">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="admin-btn-text">خروج</span>
        </button>
      </div>
    </div>

    <!-- ROW 2: Action Buttons -->
    <div class="hero-actions-row">
      <!-- زر توثيق شهيد - الأهم -->
      <button class="btn btn-document highlight-submit-btn" onclick="showDuplicateWarning()">
        <i class="fa-solid fa-plus-circle ms-1"></i>
        توثيق شهيد
      </button>

      <div class="hero-secondary-actions">
        <button class="btn btn-outline-light btn-sm" onclick="openAboutProjectModal()">
          <i class="fa-solid fa-circle-info ms-1"></i>
          <span>عن المشروع</span>
        </button>
        <button class="btn btn-outline-light btn-sm" onclick="goHome()">
          <i class="fa-solid fa-house ms-1"></i>
          <span class="home-btn-text">الرئيسية</span>
        </button>
      </div>
    </div>

  </div>
</section>
