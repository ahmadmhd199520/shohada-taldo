<body>
  <div id="appMount">
    <div class="empty-state" style="max-width:520px;margin:32px auto;">
      <div class="spinner-border text-primary mb-3"></div>
      <div>جاري تحميل ملفات الواجهة...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (async function loadTaldoPartials() {
      const mount = document.getElementById('appMount');
      const version = '20260601_final05';
      const files = [
        'partials/header.html',
        'partials/home.html',
        'partials/public-pages.html',
        'partials/dashboard.html',
        'partials/footer.html',
        'partials/modals.html'
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      try {
        const responses = await Promise.all(files.map(file => fetch(file + '?v=' + version, { cache: 'no-cache' })));
        const failed = responses.find(response => !response.ok);
        if (failed) throw new Error('تعذر تحميل أحد ملفات الواجهة.');

        const parts = await Promise.all(responses.map(response => response.text()));
        mount.innerHTML = '<div class="app-shell">' + parts.slice(0, 5).join('\n') + '</div>' + parts[5];

        await loadScript('assets/js/app.js?v=' + version);
      } catch (error) {
        mount.innerHTML = `
          <div class="empty-state" style="max-width:640px;margin:32px auto;">
            <i class="fa-solid fa-triangle-exclamation fa-2x text-warning mb-3"></i>
            <h5 class="fw-bold">تعذر تحميل ملفات الواجهة</h5>
            <p class="text-muted mb-0">تأكد من رفع مجلدات partials و assets بجانب ملف index.html.</p>
          </div>
        `;
        console.error(error);
      }
    })();
  </script>
